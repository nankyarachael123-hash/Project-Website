
<style>
*{box-sizing:border-box;margin:0;padding:0}
.w{padding:1rem 0;font-family:var(--font-sans)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.kl{font-size:12px;color:var(--color-text-secondary);margin-bottom:3px}
.kv{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.ks{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.ct{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.tab{font-size:12px;padding:5px 13px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer}
.tab.on{background:#185FA5;border-color:#185FA5;color:#fff}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;align-items:center}
.pill{font-size:12px;padding:4px 11px;border-radius:20px;border:.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-secondary);user-select:none;transition:all .15s}
.pill.on{background:#185FA5;border-color:#185FA5;color:#fff}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)}
.leg span{display:flex;align-items:center;gap:5px}
.lb{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.ld{width:18px;height:0;border-top:2px dashed #E24B4A;flex-shrink:0}
.tbl{width:100%;font-size:12px;border-collapse:collapse}
.tbl th{font-weight:500;color:var(--color-text-secondary);text-align:left;padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.tbl td{padding:6px 8px;border-bottom:.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.b{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.bp{background:#EAF3DE;color:#3B6D11}.bf{background:#FCEBEB;color:#A32D2D}.bn{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.bw{display:flex;align-items:center;gap:6px}
.bg2{flex:1;height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.bf2{height:100%;border-radius:4px;background:#185FA5}
</style>
<div class="w">
<div class="kpi-grid" id="kpiGrid"></div>
<div class="pills" id="pills"><span style="font-size:12px;color:var(--color-text-secondary);align-self:center;margin-right:2px">Agents:</span></div>
<div class="tabs">
  <button class="tab on" onclick="setTab('qc',this)">Monthly QC</button>
  <button class="tab" onclick="setTab('weekly',this)">Weekly trend</button>
  <button class="tab" onclick="setTab('cats',this)">Error categories</button>
  <button class="tab" onclick="setTab('heat',this)">Category heatmap</button>
  <button class="tab" onclick="setTab('table',this)">Scorecard</button>
</div>
<div id="pQc">

    <div class="ct">Monthly QC average per agent — target ≥ 85%</div>
    <div class="leg" id="qcLeg"></div>
    <div style="position:relative;height:300px"><canvas id="qcC"></canvas></div>
  </div>
</div>
<div id="pWeekly" style="display:none">

<div id="pCats" style="display:none">

<div id="pHeat" style="display:none">

</div>
<div id="pTable" style="display:none">

</div>
</div>

function buildKPIs(){
  const allQ=AGENTS.flatMap(a=>Object.values(QC_M[a]||{}));
  const avg=allQ.reduce((s,v)=>s+v,0)/allQ.length;
  const passing=AGENTS.filter(a=>{const v=Object.values(QC_M[a]||{});return v.length&&v.reduce((s,x)=>s+x,0)/v.length>=85;}).length;
  const totalE=AGENTS.reduce((s,a)=>s+Object.values(CAT_A[a]||{}).reduce((x,y)=>x+y,0),0);
  const merged={};
  AGENTS.forEach(a=>Object.entries(CAT_A[a]||{}).forEach(([k,v])=>merged[k]=(merged[k]||0)+v));
  const top=Object.entries(merged).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('kpiGrid').innerHTML=`
    <div class="kpi"><div class="kl">Team avg QC</div><div class="kv">${avg.toFixed(1)}%</div><div class="ks">target ≥ 85%</div></div>
    <div class="kpi"><div class="kl">Agents ≥ 85% avg</div><div class="kv">${passing} / ${AGENTS.length}</div><div class="ks">of 9 agents</div></div>

    <div class="kpi"><div class="kl">Top error</div><div class="kv" style="font-size:13px;line-height:1.4">${sh(top[0])}</div><div class="ks">${top[1]} times</div></div>`;

function buildPills(){
  const c=document.getElementById('pills');
  while(c.children.length>1)c.removeChild(c.lastChild);
  AGENTS.forEach((a,i)=>{
    const p=document.createElement('span');
    p.className='pill on';p.textContent=a.split(' ')[0];p.title=a;
    p.onclick=()=>{if(active.has(a)){if(active.size===1)return;active.delete(a);p.classList.remove('on');}else{active.add(a);p.classList.add('on');}redraw();};
    c.appendChild(p);
  });
  const all=document.createElement('span');
  all.className='pill';all.textContent='All';
  all.onclick=()=>{AGENTS.forEach(a=>active.add(a));c.querySelectorAll('.pill:not(:last-child)').forEach(p=>p.classList.add('on'));redraw();};
  c.appendChild(all);
}

function buildWPills(){
  const c=document.getElementById('wPills');c.innerHTML='';
  AGENTS.forEach((a,i)=>{
    const p=document.createElement('span');
    p.className='pill'+(a===wAgent?' on':'');
    if(a===wAgent){p.style.background=col(i);p.style.borderColor=col(i);p.style.color='#fff';}
    p.textContent=a.split(' ')[0];p.title=a;
    p.onclick=()=>{wAgent=a;buildWPills();renderWeekly();};
    c.appendChild(p);
  });
}

function renderQCLeg(){
  const ag=getActive();
  document.getElementById('qcLeg').innerHTML=
    ag.map(a=>{const i=AGENTS.indexOf(a);return`<span><span class="lb" style="background:${col(i)}"></span>${a.split(' ')[0]}</span>`;}).join('')+
    `<span><span class="ld"></span>85% target</span>`;
}

  ds.push({label:'85% target',data:MONTHS.map(()=>85),borderColor:'#E24B4A',borderDash:[6,4],borderWidth:1.5,pointRadius:0,tension:0});

    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw!=null?`${ctx.dataset.label}: ${ctx.raw.toFixed(1)}%`:null}}},
      scales:{y:{min:60,max:115,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}
  });
}

function renderWeekly(){
  if(wChart){wChart.destroy();wChart=null;}
  const i=AGENTS.indexOf(wAgent);
  const data=QC_W[wAgent]||[];
  const labels=data.map(d=>d.week);
  const scores=data.map(d=>d.score);
  // colour background bands by month
  wChart=new Chart(document.getElementById('wC'),{
    type:'line',
    data:{labels,datasets:[
      {label:wAgent,data:scores,borderColor:col(i),backgroundColor:col(i)+'22',fill:true,borderWidth:2,pointRadius:4,pointHoverRadius:7,tension:.3},
      {label:'85% target',data:labels.map(()=>85),borderColor:'#E24B4A',borderDash:[6,4],borderWidth:1.5,pointRadius:0,tension:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw?.toFixed(1)}%`,title:ctxs=>`${ctxs[0].label} (${data[ctxs[0].dataIndex]?.month})`}}},
      scales:{y:{min:40,max:115,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},
        x:{ticks:{font:{size:10},maxRotation:45,autoSkip:false},grid:{display:false}}}}
  });
}

function renderCatLeg(sorted,colors){
  document.getElementById('catLeg').innerHTML=sorted.slice(0,8).map((e,i)=>`<span><span class="lb" style="background:${colors[i]}"></span>${sh(e[0])}</span>`).join('');
}

function renderCats(){
  if(catChart){catChart.destroy();catChart=null;}
  const ag=getActive();
  const merged={};
  ag.forEach(a=>Object.entries(CAT_A[a]||{}).forEach(([k,v])=>merged[k]=(merged[k]||0)+v));
  const sorted=Object.entries(merged).sort((a,b)=>b[1]-a[1]).slice(0,14);
  const labels=sorted.map(e=>sh(e[0]));
  const vals=sorted.map(e=>e[1]);
  const colors=sorted.map((_,i)=>PAL[i%PAL.length]);
  renderCatLeg(sorted,colors);
  const h=Math.max(380,sorted.length*42+80);
  document.getElementById('catWrap').style.height=h+'px';
  catChart=new Chart(document.getElementById('catC'),{
    type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw} occurrences`}}},
      scales:{x:{ticks:{stepSize:1,font:{size:11}},grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{font:{size:11}},grid:{display:false}}}}
  });
}

function renderHeat(){
  const allCats=Object.keys(Object.values(CAT_MO).reduce((acc,o)=>{Object.keys(o).forEach(k=>acc[k]=true);return acc;},{}))
    .sort((a,b)=>MONTHS.reduce((s,m)=>s+(CAT_MO[m]?.[b]||0),0)-MONTHS.reduce((s,m)=>s+(CAT_MO[m]?.[a]||0),0));
  const maxV=Math.max(...allCats.flatMap(c=>MONTHS.map(m=>CAT_MO[m]?.[c]||0)));
  let html=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr><th style="text-align:left;padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em">Category</th>`;
  MONTHS.forEach(m=>html+=`<th style="text-align:center;padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em">${m}</th>`);
  html+=`<th style="text-align:center;padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em">Total</th></tr></thead><tbody>`;
  allCats.forEach(cat=>{
    const total=MONTHS.reduce((s,m)=>s+(CAT_MO[m]?.[cat]||0),0);
    if(!total)return;
    html+=`<tr><td style="padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-size:11px;white-space:nowrap">${sh(cat)}</td>`;
    MONTHS.forEach(m=>{
      const v=CAT_MO[m]?.[cat]||0;
      const pct=v/maxV;
      const bg=v?`rgba(24,95,165,${(0.1+pct*0.75).toFixed(2)})`:'transparent';
      const tc=v?(pct>.5?'#fff':'var(--color-text-primary)'):'var(--color-text-tertiary)';
      html+=`<td style="text-align:center;padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);background:${bg};color:${tc};font-weight:${v?500:400}">${v||'—'}</td>`;
    });
    html+=`<td style="text-align:center;padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-weight:600;color:var(--color-text-primary)">${total}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('heatGrid').innerHTML=html;
}

function renderTables(){
  const ag=getActive();
  // QC scorecard
  const sc=document.getElementById('scTbl');
  sc.querySelector('thead').innerHTML=`<tr><th>Agent</th>${MONTHS.map(m=>`<th>${m}</th>`).join('')}<th>Avg QC</th></tr>`;
  sc.querySelector('tbody').innerHTML=ag.map(a=>{
    const known=MONTHS.filter(m=>QC_M[a]?.[m]!=null);
    const avg=known.length?known.reduce((s,m)=>s+QC_M[a][m],0)/known.length:null;
    return`<tr><td style="font-weight:500;white-space:nowrap">${a}</td>`+
      MONTHS.map(m=>{const v=QC_M[a]?.[m];return`<td>${v!=null?`<span class="b ${v>=85?'bp':'bf'}">${v.toFixed(1)}%</span>`:'<span class="b bn">—</span>'}</td>`;}).join('')+
      `<td>${avg!=null?`<span class="b ${avg>=85?'bp':'bf'}">${avg.toFixed(1)}%</span>`:'—'}</td></tr>`;
  }).join('');
  // Category table
  const allCats=[...new Set(ag.flatMap(a=>Object.keys(CAT_A[a]||{})))].sort((a,b)=>
    ag.reduce((s,x)=>s+(CAT_A[x]?.[b]||0),0)-ag.reduce((s,x)=>s+(CAT_A[x]?.[a]||0),0));
  const maxC=Math.max(...allCats.map(c=>ag.reduce((s,x)=>s+(CAT_A[x]?.[c]||0),0)));
  const ct=document.getElementById('catTbl');
  ct.querySelector('thead').innerHTML=`<tr><th>Category</th>${ag.map(a=>`<th>${a.split(' ')[0]}</th>`).join('')}<th>Total</th></tr>`;
  ct.querySelector('tbody').innerHTML=allCats.map(cat=>{
    const total=ag.reduce((s,a)=>s+(CAT_A[a]?.[cat]||0),0);
    if(!total)return'';
    return`<tr><td style="font-size:11px;white-space:nowrap">${sh(cat)}</td>`+
      ag.map(a=>{const v=CAT_A[a]?.[cat]||0;return`<td style="text-align:center">${v?`<span style="font-size:12px;font-weight:600;color:${col(AGENTS.indexOf(a))}">${v}</span>`:'—'}</td>`;}).join('')+
      `<td><div class="bw"><div class="bg2"><div class="bf2" style="width:${Math.round(total/maxC*100)}%"></div></div><span style="font-size:11px;font-weight:600;min-width:20px">${total}</span></div></td></tr>`;
  }).join('');
}

function redraw(){
  if(curTab==='qc')renderQC();
  else if(curTab==='weekly'){buildWPills();renderWeekly();}
  else if(curTab==='cats')renderCats();
  else if(curTab==='heat')renderHeat();
  else if(curTab==='table')renderTables();
}

function setTab(t,btn){
  curTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['pQc','pWeekly','pCats','pHeat','pTable'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById({qc:'pQc',weekly:'pWeekly',cats:'pCats',heat:'pHeat',table:'pTable'}[t]).style.display='';
  redraw();
}

buildKPIs(); buildPills(); renderQC();
</script>
